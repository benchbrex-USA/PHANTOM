# Phantom Release Workflow
# Builds signed macOS binaries for arm64 and x86_64, creates GitHub Release.
#
# Trigger: Push a tag like v0.1.0
# Secrets required:
#   APPLE_CERTIFICATE_BASE64   — Developer ID Application certificate (.p12, base64-encoded)
#   APPLE_CERTIFICATE_PASSWORD — Password for the .p12 certificate
#   APPLE_TEAM_ID              — Apple Developer Team ID
#   APPLE_ID                   — Apple ID email for notarization
#   APPLE_ID_PASSWORD          — App-specific password for notarization
#   APPLE_SIGNING_IDENTITY     — e.g. "Developer ID Application: Benchbrex Inc (TEAMID)"

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: phantom

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            arch: arm64
          - target: x86_64-apple-darwin
            arch: x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Import Apple certificate
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          # Create temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          CERT_PATH=$RUNNER_TEMP/certificate.p12
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"
          security import "$CERT_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          # Set keychain search list
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain

          # Allow codesign to access the key without prompt
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Code sign binary
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          BINARY="target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}"

          # Sign with hardened runtime (required for notarization)
          codesign --force --options runtime \
            --sign "$APPLE_SIGNING_IDENTITY" \
            --timestamp \
            "$BINARY"

          # Verify signature
          codesign --verify --deep --strict --verbose=2 "$BINARY"
          echo "Code signing successful"

      - name: Notarize binary
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          BINARY="target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}"
          VERSION="${GITHUB_REF_NAME#v}"

          # Create a ZIP for notarization (notarytool requires zip/dmg/pkg)
          NOTARIZE_ZIP="$RUNNER_TEMP/phantom-notarize.zip"
          ditto -c -k --keepParent "$BINARY" "$NOTARIZE_ZIP"

          # Submit for notarization
          xcrun notarytool submit "$NOTARIZE_ZIP" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait \
            --timeout 600

          echo "Notarization successful"

      - name: Package release archive
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ASSET_NAME="${{ env.BINARY_NAME }}-${VERSION}-${{ matrix.target }}"
          BINARY="target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}"

          # Create tar.gz archive
          mkdir -p "dist/${ASSET_NAME}"
          cp "$BINARY" "dist/${ASSET_NAME}/${{ env.BINARY_NAME }}"
          cd dist
          tar -czf "${ASSET_NAME}.tar.gz" "${ASSET_NAME}"

          # Generate SHA-256 checksum
          shasum -a 256 "${ASSET_NAME}.tar.gz" > "${ASSET_NAME}.tar.gz.sha256"

          echo "ASSET_PATH=dist/${ASSET_NAME}.tar.gz" >> $GITHUB_ENV
          echo "CHECKSUM_PATH=dist/${ASSET_NAME}.tar.gz.sha256" >> $GITHUB_ENV

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: |
            ${{ env.ASSET_PATH }}
            ${{ env.CHECKSUM_PATH }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.sha256
          body: |
            ## Installation

            ```bash
            curl -fsSL https://raw.githubusercontent.com/benchbrex/phantom/main/install.sh | bash
            ```

            Or update an existing installation:
            ```bash
            phantom self-update
            ```

            ## Checksums

            Verify your download:
            ```bash
            shasum -a 256 -c phantom-*.tar.gz.sha256
            ```

  cleanup:
    name: Cleanup signing keychain
    needs: build
    runs-on: macos-latest
    if: always()
    steps:
      - name: Delete temporary keychain
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          if [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          fi
